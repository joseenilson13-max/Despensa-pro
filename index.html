<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despensa Pro - Consultor de Armazenamento</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --accent: #00acc1;
            --warning: #ff9100;
            --danger: #ff5252;
            --bg: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            margin: 0;
            color: #243b53;
            min-height: 100vh;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(46, 125, 50, 0.3);
            margin-bottom: 2rem;
        }

        header h1 { margin: 0; font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }

        .container { max-width: 500px; margin: 0 auto; padding: 0 20px 40px; }

        .notif-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            color: var(--accent);
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        h2 { font-size: 1.1rem; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { display: flex; flex-direction: column; gap: 15px; }

        label { font-size: 0.75rem; font-weight: 800; color: #627d98; margin-bottom: 5px; display: block; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d9e2ec;
            background: #f0f4f8;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .item-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid var(--primary-light);
        }

        .item-card.vencendo { border-left-color: var(--warning); background: #fffcf5; }
        .item-card.vencido { border-left-color: var(--danger); background: #fff5f5; }

        .status-txt { font-size: 0.8rem; font-weight: 700; margin-top: 4px; display: block; }
        .vencendo-txt { color: var(--warning); }
        .vencido-txt { color: var(--danger); }

        .btn-del {
            background: #f0f4f8;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #9fb3c8;
            cursor: pointer;
        }

        /* Estilo das Dicas Sugeridas */
        .tip-card {
            background: #e3f2fd;
            border-radius: 16px;
            padding: 18px;
            margin-top: 12px;
            border-left: 5px solid var(--accent);
            animation: fadeIn 0.5s ease;
        }

        .tip-card.frio { background: #e0f2f1; border-left-color: #00897b; }
        .tip-card.limpeza { background: #f3e5f5; border-left-color: #8e24aa; }

        .tip-card strong { color: #102a43; font-size: 0.95rem; display: block; margin-bottom: 8px; }
        .tip-card p { margin: 0; font-size: 0.85rem; color: #334e68; line-height: 1.5; }
        .tip-card .por-que { font-weight: 700; color: inherit; margin-top: 5px; display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>DESPENSA PRO</h1>
</header>

<div class="container">
    <button id="btn-notificacao" class="notif-btn" onclick="solicitarPermissao()">
        🔔 ATIVAR ALERTAS INTELIGENTES
    </button>

    <div class="card">
        <h2>📦 NOVO REGISTRO</h2>
        <div class="form-group">
            <div>
                <label>PRODUTO</label>
                <input type="text" id="prod-nome" placeholder="Ex: Carne, Banana, Sabão...">
            </div>
            <div>
                <label>DATA</label>
                <input type="date" id="prod-validade">
            </div>
            <button class="btn-add" onclick="adicionarItem()">SALVAR NO ESTOQUE</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 MONITORAMENTO</h2>
        <div id="lista-estoque"></div>
    </div>

    <div class="card">
        <h2>💡 GUIA TÉCNICO DE SUGESTÕES</h2>
        <div id="dicas-armazenamento"></div>
    </div>
</div>

<script>
    let estoque = JSON.parse(localStorage.getItem('despensa_v_final')) || [];

    // Lógica de Notificações
    function solicitarPermissao() {
        if (!("Notification" in window)) return alert("Sem suporte a notificações.");
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                alert("Alertas ativos para 10 dias de antecedência!");
                document.getElementById('btn-notificacao').style.display = 'none';
                verificarAlertas();
            }
        });
    }

    function verificarAlertas() {
        if (Notification.permission !== "granted") return;
        estoque.forEach(item => {
            const dias = calcularDias(item.validade);
            if (dias >= 0 && dias <= 10) {
                new Notification("Alerta de Consumo!", { body: `${item.nome} vence em ${dias} dias.` });
            }
        });
    }

    function calcularDias(dataValidade) {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const val = new Date(dataValidade); val.setHours(0,0,0,0);
        return Math.ceil((val - hoje) / (1000 * 60 * 60 * 24));
    }

    function adicionarItem() {
        const nome = document.getElementById('prod-nome').value;
        const validade = document.getElementById('prod-validade').value;
        if (!nome || !validade) return alert("Preencha todos os campos!");
        estoque.push({ id: Date.now(), nome: nome, validade: validade });
        salvar();
        document.getElementById('prod-nome').value = '';
    }

    function confirmarRemocao(id, nome) {
        if (confirm(`Excluir "${nome}" do sistema?`)) {
            estoque = estoque.filter(i => i.id !== id);
            salvar();
        }
    }

    function salvar() {
        localStorage.setItem('despensa_v_final', JSON.stringify(estoque));
        renderizar();
    }

    function renderizar() {
        const lista = document.getElementById('lista-estoque');
        const dicasDiv = document.getElementById('dicas-armazenamento');
        lista.innerHTML = '';
        estoque.sort((a, b) => new Date(a.validade) - new Date(b.validade));

        estoque.forEach(item => {
            const dias = calcularDias(item.validade);
            const dt = new Date(item.validade).toLocaleDateString('pt-br', {timeZone: 'UTC'});
            let classe = dias < 0 ? 'vencido' : (dias <= 10 ? 'vencendo' : '');
            let statusTxt = dias < 0 ? `Vencido há ${Math.abs(dias)} dias` : `Faltam ${dias} dias`;

            lista.innerHTML += `
                <div class="item-card ${classe}">
                    <div>
                        <strong>${item.nome}</strong>
                        <span style="font-size:0.8rem; color:#627d98; display:block;">Validade: ${dt}</span>
                        <span class="status-txt ${dias < 0 ? 'vencido-txt' : (dias <= 10 ? 'vencendo-txt' : '')}">${statusTxt}</span>
                    </div>
                    <button class="btn-del" onclick="confirmarRemocao(${item.id}, '${item.nome}')">✕</button>
                </div>`;
        });
        gerarSugestoes(dicasDiv);
    }

    // BASE DE DADOS DE SUGESTÕES TÉCNICAS
    function gerarSugestoes(container) {
        const nomes = estoque.map(i => i.nome.toLowerCase());
        let html = "";
        
        const sugestoes = [
            { chaves: ['arroz', 'feijão', 'farinha', 'macarrão'], tipo: 'seco', titulo: "GRÃOS E CEREAIS", dica: "Armazenar em potes de vidro ou plástico rígido hermético.", motivo: "Evita a infestação por carunchos e mantém a crocância ao impedir a entrada de umidade." },
            { chaves: ['carne', 'frango', 'peixe'], tipo: 'frio', titulo: "PROTEÍNAS", dica: "Manter no freezer ou na gaveta superior de congelamento.", motivo: "Proteínas oxidam e degradam rapidamente sob flutuação de temperatura; o congelamento interrompe a atividade bacteriana." },
            { chaves: ['banana', 'maçã', 'tomate'], tipo: 'frio', titulo: "FRUTAS E VEGETAIS", dica: "Separar frutas maduras das verdes.", motivo: "Frutas liberam gás etileno, que acelera o amadurecimento (e o apodrecimento) de outros vegetais próximos." },
            { chaves: ['leite', 'queijo', 'iogurte'], tipo: 'frio', titulo: "LATICÍNIOS", dica: "Não guardar na porta da geladeira.", motivo: "A porta é o local com maior variação térmica. Laticínios precisam de estabilidade para não coalharem antes do prazo." },
            { chaves: ['sabão', 'detergente', 'alvejante'], tipo: 'limpeza', titulo: "PRODUTOS DE LIMPEZA", dica: "Manter longe de alimentos e em local alto.", motivo: "Evita a contaminação cruzada química e garante a segurança contra ingestão acidental por crianças ou animais." }
        ];

        sugestoes.forEach(s => {
            if (nomes.some(n => s.chaves.some(c => n.includes(c)))) {
                html += `
                    <div class="tip-card ${s.tipo}">
                        <strong>✨ ${s.titulo}: ${s.dica}</strong>
                        <p><span class="por-que">POR QUÊ?</span> ${s.motivo}</p>
                    </div>`;
            }
        });

        container.innerHTML = html || "<p style='color:#9fb3c8; font-size:0.85rem;'>As sugestões técnicas aparecerão aqui conforme você adicionar itens.</p>";
    }

    if (Notification.permission === "granted") document.getElementById('btn-notificacao').style.display = 'none';
    renderizar();
</script>
</body>
</html>
