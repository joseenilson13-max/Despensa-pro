<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Despensa Pro - Versão Estável</title>
    <style>
        :root { --primary: #1b5e20; --primary-light: #4caf50; --accent: #00acc1; --warning: #ff9100; --danger: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 250px; color: #333; }
        header { background: var(--primary); color: white; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        .card { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #eee; font-weight: 800; }
        .form-group { margin-bottom: 10px; }
        label { font-size: 0.65rem; font-weight: 800; color: #666; display: block; margin-bottom: 3px; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--primary); color: white; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid var(--primary-light); border: 1px solid #eee; }
        .item.vencendo { border-left-color: var(--warning); background: #fffcf0; }
        .item.vencido { border-left-color: var(--danger); background: #fff5f5; }
        .item b { font-size: 0.95rem; display: block; }
        .item small { font-size: 0.75rem; color: #666; }
        .tip-card { background: #e1f5fe; border-radius: 8px; padding: 12px; margin-top: 10px; border-left: 4px solid var(--accent); font-size: 0.8rem; line-height: 1.4; }
        #backup-area { width: 100%; height: 60px; font-size: 0.7rem; margin-top: 10px; display: none; }
        .support { display: block; background: #009ee3; color: white; text-align: center; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header><h1>DESPENSA PRO</h1></header>

<div class="container">
    <div class="card">
        <h2>📦 CADASTRAR PRODUTO</h2>
        <div class="form-group">
            <label>NOME DO ALIMENTO</label>
            <input type="text" id="nome" list="sugestoes" placeholder="Ex: Carne Bovina">
        </div>
        <div class="form-group">
            <label>DATA DE VALIDADE</label>
            <input type="date" id="data">
        </div>
        <button class="btn btn-add" onclick="adicionar()">SALVAR NO ESTOQUE</button>
    </div>

    <div class="card">
        <h2>📋 MONITORAMENTO</h2>
        <div id="lista-alimentos"></div>
    </div>

    <div class="card">
        <h2>💡 GUIA TÉCNICO</h2>
        <div id="guia-tecnico"></div>
    </div>

    <div class="card" style="background: #f1f8e9;">
        <h2>☁️ BACKUP SEGURO</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn" style="background: #eceff1; font-size: 0.7rem;" onclick="gerarBackup()">GERAR CÓDIGO</button>
            <button class="btn" style="background: #fff; border: 1px solid #ccc; font-size: 0.7rem;" onclick="restaurarBackup()">RESTAURAR</button>
        </div>
        <textarea id="backup-area" placeholder="Cole seu código aqui..."></textarea>
    </div>

    <a href="https://mpago.la/2cixZQ9" target="_blank" class="support">APOIAR PROJETO</a>
</div>

<datalist id="sugestoes">
    <option value="Arroz"><option value="Feijão"><option value="Carne Bovina"><option value="Frango">
    <option value="Banana"><option value="Leite"><option value="Ovos"><option value="Alface">
</datalist>

<script>
    // Chave única para garantir estabilidade dos dados
    const DB_KEY = 'despensa_pro_final_v1';
    let estoque = JSON.parse(localStorage.getItem(DB_KEY)) || [];

    function adicionar() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data').value;
        if(!nome || !data) return alert("Preencha todos os campos!");
        estoque.push({ id: Date.now(), nome, data });
        salvar();
        document.getElementById('nome').value = '';
        document.getElementById('data').value = '';
    }

    function deletar(id) {
        if(confirm("Remover este item?")) {
            estoque = estoque.filter(i => i.id !== id);
            salvar();
        }
    }

    function salvar() {
        localStorage.setItem(DB_KEY, JSON.stringify(estoque));
        renderizar();
    }

    function renderizar() {
        const div = document.getElementById('lista-alimentos');
        const guia = document.getElementById('guia-tecnico');
        div.innerHTML = ''; guia.innerHTML = '';
        estoque.sort((a,b) => new Date(a.data) - new Date(b.data));

        estoque.forEach(i => {
            const dias = Math.ceil((new Date(i.data) - new Date().setHours(0,0,0,0)) / 86400000);
            const dataF = new Date(i.data).toLocaleDateString('pt-br', {timeZone: 'UTC'});
            let classe = dias < 0 ? 'vencido' : (dias <= 5 ? 'vencendo' : '');
            
            div.innerHTML += `
                <div class="item ${classe}">
                    <div>
                        <b>${i.nome}</b>
                        <small>${dias < 0 ? 'Vencido' : 'Vence em '+dias+' dias'}</small>
                        <small style="display:block; color:#999">Validade: ${dataF}</small>
                    </div>
                    <button onclick="deletar(${i.id})" style="background:none; border:none; color:#ccc; font-size:1.2rem;">✕</button>
                </div>`;
            aplicarGuia(i.nome, guia);
        });
    }

    function aplicarGuia(nome, container) {
        const n = nome.toLowerCase();
        const base = [
            { c: ['arroz', 'feijão'], t: "Grãos", d: "Mantenha em recipientes herméticos para evitar carunchos e umidade." },
            { c: ['carne', 'frango'], t: "Proteínas", d: "A oxidação lipídica ocorre rápido acima de 4°C. Mantenha em frio máximo." },
            { c: ['banana', 'maçã'], t: "Climatéricos", d: "Liberam gás etileno. Devem ser mantidos ventilados e longe de folhas." },
            { c: ['leite', 'queijo'], t: "Laticínios", d: "Altamente perecíveis. Após aberto, consumir em no máximo 3 dias." },
            { c: ['alface', 'folhas'], t: "Hortaliças", d: "Use papel toalha no pote para absorver a umidade e evitar fungos." }
        ];
        base.forEach(item => {
            if (item.c.some(key => n.includes(key))) {
                if (!container.innerHTML.includes(item.t)) {
                    container.innerHTML += `<div class="tip-card"><strong>🔍 ${item.t}:</strong> ${item.d}</div>`;
                }
            }
        });
    }

    function gerarBackup() {
        const code = btoa(JSON.stringify(estoque));
        const area = document.getElementById('backup-area');
        area.value = code; area.style.display = 'block';
        area.select(); document.execCommand('copy');
        alert("Código de backup copiado!");
    }

    function restaurarBackup() {
        const code = document.getElementById('backup-area').value;
        try {
            estoque = JSON.parse(atob(code));
            salvar();
            alert("Dados restaurados!");
            document.getElementById('backup-area').style.display = 'none';
        } catch(e) { alert("Código inválido!"); }
    }

    renderizar();
</script>
</body>
</html>
